<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIMARY</title>
<style>
  @font-face {
    font-family: 'PrimaryFont';
    src: url('font.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  @font-face {
    font-family: 'LinksFont';
    src: url('font2.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    background-color: #000000;
    font-family: 'PrimaryFont', sans-serif;
    color: #ffffff;
    background-image:
      linear-gradient(to right, #151823 1px, transparent 1px),
      linear-gradient(to bottom, #151823 1px, transparent 1px);
    background-size: clamp(24px, 4vw, 40px) clamp(24px, 4vw, 40px);
  }

  body {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: clamp(30px, 8vh, 60px) clamp(16px, 5vw, 20px);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: clamp(400px, 90vw, 900px);
    height: clamp(400px, 90vw, 900px);
    background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, rgba(139, 92, 246, 0) 70%);
    pointer-events: none;
    z-index: 0;
  }

  .title, .subtitle, .links-section {
    position: relative;
    z-index: 1;
  }

  .title {
    font-size: clamp(3rem, 11vw, 7rem);
    letter-spacing: 0.12em;
    color: #ffffff;
    text-align: center;
    text-shadow: 0 0 30px rgba(168, 85, 247, 0.35);
  }

  .subtitle {
    margin-top: 2px;
    font-size: clamp(1rem, 3vw, 1.6rem);
    letter-spacing: 0.08em;
    color: #6b6f80;
    text-align: center;
  }

  .links-section {
    margin-top: clamp(30px, 8vh, 60px);
    width: 100%;
    max-width: 700px;
    text-align: center;
  }

  .links-title {
    font-size: clamp(2rem, 6.5vw, 3.4rem);
    letter-spacing: 0.12em;
    color: #ffffff;
    margin-bottom: clamp(18px, 4vh, 30px);
    text-shadow: 0 0 20px rgba(168, 85, 247, 0.25);
  }

  .link-group {
    margin-bottom: 18px;
    padding-bottom: 12px;
    position: relative;
  }

  .link-group:not(:last-child)::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: clamp(80px, 25vw, 180px);
    height: 1px;
    background-color: #35384a;
  }

  .header-divider {
    margin-top: clamp(14px, 3vh, 24px);
    width: clamp(80px, 25vw, 180px);
    height: 1px;
    background-color: #35384a;
  }

  .link-group h2 {
    font-size: clamp(1.1rem, 3.2vw, 1.5rem);
    color: #8a8fa3;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .link-group a {
    display: block;
    font-family: 'LinksFont', sans-serif;
    color: #a855f7;
    text-decoration: none;
    font-size: clamp(1.1rem, 3.5vw, 1.6rem);
    margin: 4px 0;
    word-break: break-all;
    transition: color 0.2s ease, text-shadow 0.2s ease;
  }

  .link-group a:hover {
    color: #d8b4fe;
    text-shadow: 0 0 12px rgba(216, 180, 254, 0.6);
  }

  .contact-value {
    display: block;
    font-family: 'LinksFont', sans-serif;
    color: #a855f7;
    font-size: clamp(1.1rem, 3.5vw, 1.6rem);
    margin: 4px 0;
  }

  .contact-row {
    font-size: clamp(1.1rem, 3.5vw, 1.6rem);
    color: #ffffff;
    margin: 4px 0;
  }

  .contact-label {
    font-family: 'PrimaryFont', sans-serif;
    letter-spacing: 0.05em;
    color: #8a8fa3;
  }

  .contact-username {
    font-family: 'LinksFont', sans-serif;
    color: #a855f7;
    cursor: pointer;
    position: relative;
    transition: color 0.2s ease, text-shadow 0.2s ease;
  }

  .contact-username:hover {
    color: #d8b4fe;
    text-shadow: 0 0 12px rgba(216, 180, 254, 0.6);
  }

  .contact-username::after {
    content: attr(data-copied);
    position: absolute;
    top: -1.8em;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'PrimaryFont', sans-serif;
    font-size: 0.6em;
    letter-spacing: 0.05em;
    color: #d8b4fe;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    white-space: nowrap;
  }

  .contact-username.copied::after {
    opacity: 1;
  }

  .dev-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .dev-modal.open {
    display: flex;
  }

  .dev-key-input {
    font-family: 'LinksFont', sans-serif;
    background: #0a0a0f;
    border: 1px solid #35384a;
    border-radius: 8px;
    color: #ffffff;
    font-size: 1.2rem;
    padding: 12px 16px;
    width: 260px;
    max-width: 80vw;
    text-align: center;
    outline: none;
  }

  .dev-key-input:focus {
    border-color: #a855f7;
  }

  .reveal-text {
    font-family: 'LinksFont', sans-serif;
    color: #ffffff;
    font-size: clamp(1.1rem, 3.5vw, 1.6rem);
    text-align: center;
    max-width: 700px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .reveal-link {
    color: #a855f7;
    text-decoration: none;
    transition: color 0.2s ease, text-shadow 0.2s ease;
  }

  .reveal-link:hover {
    color: #d8b4fe;
    text-shadow: 0 0 12px rgba(216, 180, 254, 0.6);
  }
</style>
</head>
<body>

  <div class="title">PRIMARY</div>
  <div class="subtitle">terraformationisevil and kittymaster</div>

  <div class="header-divider"></div>

  <div class="links-section">
    <div class="links-title">LINKS</div>

    <div class="link-group">
      <h2>GITHUB LINKS</h2>
      <a href="https://terraformationisevil.github.io/gamelink/" target="_blank">https://terraformationisevil.github.io/gamelink/</a>
    </div>

    <div class="link-group">
      <h2>OTHER LINKS</h2>
      <a href="https://modrinth.com/user/kittymaster103192" target="_blank">https://modrinth.com/user/kittymaster103192</a>
      <a href="https://www.youtube.com/@Kittymastor/videos" target="_blank">https://www.youtube.com/@Kittymastor/videos</a>
    </div>
  </div>

  <div class="header-divider"></div>

  <div class="links-section">
    <div class="links-title">CONTACT</div>

    <div class="link-group">
      <div class="contact-row">
        <span class="contact-label">DISCORD:</span>
        <span class="contact-username" data-copied="Copied!" onclick="copyUsername(this, 'kittymastr')">kittymastr</span>
      </div>
    </div>

    <div class="link-group">
      <div class="contact-row">
        <span class="contact-label">TWITTER/X:</span>
        <span class="contact-username" data-copied="Copied!" onclick="copyUsername(this, 'Kittymaster0708')">Kittymaster0708</span>
      </div>
    </div>
  </div>

  <div id="dev-divider" class="header-divider" style="display:none;"></div>

  <div id="dev-section" class="links-section" style="display:none;">
    <div id="dev-text" class="reveal-text"></div>
  </div>

  <div id="dev-modal" class="dev-modal">
    <input type="password" id="dev-key-input" class="dev-key-input" autocomplete="off" spellcheck="false" />
  </div>

  <script>
    function copyUsername(el, value) {
      function showCopied() {
        el.classList.add('copied');
        setTimeout(function () {
          el.classList.remove('copied');
        }, 1200);
      }

      function fallbackCopy() {
        var textarea = document.createElement('textarea');
        textarea.value = value;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        try {
          document.execCommand('copy');
        } catch (err) {}
        document.body.removeChild(textarea);
        showCopied();
      }

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(value).then(showCopied, fallbackCopy);
      } else {
        fallbackCopy();
      }
    }
  </script>

  <script>
    (function () {
      var ENCRYPTED = "W7xKX+Mv4o4J7brkm8J5U8vCPQsHd1KsoOav+K140+Amnn/0wM6HqJpVp3HXOPA14D4c0Rl2TBAXEt+zwyUNP32RhBlkuw6sgZyKw000NSydl1Gv/ZP9GbXzHTjYd5omJQUR4vIdfPYCb8j8lDknPJSqnV6nXPAFwIqmUQkqV+PYTDeCLAS437WyS5DjsrRII5Nxgca4OMwMmydH8BD0TiAqAlqsMZ7PlsKjXbOaA+F3haZd8D6txHQewI/PWShyya9U4L9D0aG2iHECdqXXiAEPuL0wN+V3SgLDDg81cA==";
      var PBKDF2_ITERATIONS = 250000;
      var enc = new TextEncoder();
      var dec = new TextDecoder();

      var modal = document.getElementById('dev-modal');
      var keyInput = document.getElementById('dev-key-input');
      var devDivider = document.getElementById('dev-divider');
      var devSection = document.getElementById('dev-section');
      var devText = document.getElementById('dev-text');

      function base64ToBuf(b64) {
        var bin = atob(b64);
        var bytes = new Uint8Array(bin.length);
        for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        return bytes.buffer;
      }

      function deriveKey(password, salt) {
        return crypto.subtle.importKey(
          'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
        ).then(function (baseKey) {
          return crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: salt, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
            baseKey,
            { name: 'AES-GCM', length: 256 },
            false,
            ['decrypt']
          );
        });
      }

      function attemptDecrypt(password) {
        var packed = new Uint8Array(base64ToBuf(ENCRYPTED));
        var salt = packed.slice(0, 16);
        var iv = packed.slice(16, 28);
        var ciphertext = packed.slice(28);
        return deriveKey(password, salt).then(function (key) {
          return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ciphertext);
        }).then(function (plainBuf) {
          return dec.decode(plainBuf);
        });
      }

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function linkify(str) {
        var escaped = escapeHtml(str);
        var urlRegex = /((?:https?:\/\/|www\.)[^\s<]+)/gi;
        return escaped.replace(urlRegex, function (match) {
          var href = /^https?:\/\//i.test(match) ? match : 'https://' + match;
          return '<a href="' + href + '" target="_blank" rel="noopener noreferrer" class="reveal-link">' + match + '</a>';
        });
      }

      // ---- Hidden "dev" trigger ----
      var buffer = '';
      document.addEventListener('keydown', function (e) {
        if (modal.classList.contains('open')) return;
        if (e.key.length === 1) {
          buffer = (buffer + e.key.toLowerCase()).slice(-3);
          if (buffer === 'dev') {
            buffer = '';
            openModal();
          }
        }
      });

      function openModal() {
        modal.classList.add('open');
        keyInput.value = '';
        keyInput.focus();
      }

      function closeModal() {
        modal.classList.remove('open');
        keyInput.blur();
      }

      keyInput.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          closeModal();
          return;
        }
        if (e.key === 'Enter') {
          var password = keyInput.value;
          attemptDecrypt(password).then(function (plaintext) {
            devText.innerHTML = linkify(plaintext);
            devDivider.style.display = '';
            devSection.style.display = '';
            closeModal();
          }).catch(function () {
            keyInput.value = '';
          });
        }
      });
    })();
  </script>

</body>
</html>
